<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>隨身道場 - 模式分流精進版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #force-start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 99999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .unlock-btn { border: 2px solid #ffcf40; color: #ffcf40; padding: 30px; border-radius: 50px; text-align: center; line-height: 1.8; }
        #timer-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #444; }
        #timer-clock { font-size: 2rem; color: #ff9500; font-weight: bold; font-family: monospace; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="force-start-overlay">
        <div class="unlock-btn">🙏<br>進入一小時精進道場<br><span style="font-size:12px; opacity:0.8;">(標準模式百次鳴磬 / 默念模式安靜修行)</span></div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: -5px;">
            <p id="streak-counter" style="font-size: 0.85rem; color: #4CAF50; font-weight: bold; margin: 0;">連續修行：0 天</p>
            <p id="lifetime-counter" style="font-size: 0.85rem; color: #bbb; margin: 0;">累計進度：0</p>
        </div>
        
        <h1 id="counter" style="margin-top: 15px;">本次進度：0</h1>

        <div id="timer-box">
            <div style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">修行倒數</div>
            <div id="timer-clock">60:00</div>
        </div>

        <p id="status-text">道場就緒，請啟動</p>

        <div class="control-panel">
            <div class="input-group">
                <label>修行模式：</label>
                <select id="mode-select" style="background: #333; color: white; border: 1px solid #555; padding: 3px;">
                    <option value="standard">標準模式 (1計1+百次鳴磬)</option>
                    <option value="recitation">默念模式 (5計1+全程安靜)</option>
                </select>
            </div>
            <div class="input-group">
                <label>敲擊速度：</label>
                <input type="number" id="speed-input" value="60" min="1" max="200">
                <span> BPM</span>
            </div>
            <div class="button-group" style="margin-top: 10px;">
                <button id="start-btn" disabled style="width: 100px;">開始修行</button>
                <button id="stop-btn" style="width: 100px;">停止</button>
            </div>
            <div class="test-group" style="margin-top:15px;">
                <button id="reset-btn" class="test-btn" style="background: #a11; font-size: 11px;">重設紀錄</button>
            </div>
        </div>

        <div id="muyu-btn" style="cursor: pointer; -webkit-tap-highlight-color: transparent;">
            <img src="muyu_image.png" alt="木魚" id="muyu-img">
            <span id="floating-text">修行中</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
