<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>隨身道場 - 雙樂器精進版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #force-start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 99999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .unlock-btn { border: 2px solid #ffcf40; color: #ffcf40; padding: 25px 35px; border-radius: 50px; text-align: center; line-height: 1.6; }
        
        /* 樂器並排容器 */
        .instruments-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            margin-top: 20px;
        }
        
        .instrument-item {
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .instrument-item:active { transform: scale(0.9); }
        .instrument-item img { width: 120px; height: auto; }

        .floating-label {
            position: absolute; top: -30px; left: 50%;
            transform: translateX(-50%);
            opacity: 0; color: #ffcf40; font-weight: bold; pointer-events: none;
        }
        .animate-up { animation: floatUp 0.5s ease-out; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -50px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="force-start-overlay">
        <div class="unlock-btn">🙏<br>進入雙樂器道場<br><span style="font-size:12px; opacity:0.8;">點擊解鎖音訊</span></div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: -5px;">
            <p id="streak-counter" style="font-size: 0.85rem; color: #4CAF50; font-weight: bold; margin: 0;">連續修行：0 天</p>
            <p id="lifetime-counter" style="font-size: 0.85rem; color: #bbb; margin: 0;">累計進度：0</p>
        </div>
        
        <h1 id="counter" style="margin-top: 10px; margin-bottom: 5px;">本次進度：0</h1>
        <div id="timer-box" style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin: 10px 0; border: 1px solid #444;">
            <div id="timer-clock" style="font-size: 1.8rem; color: #ff9500; font-weight: bold; font-family: monospace;">00:00</div>
        </div>

        <div class="control-panel">
            <div class="input-row" style="margin-bottom: 8px;">
                <select id="mode-select"><option value="recitation">默念模式</option><option value="standard">標準模式</option></select>
                <select id="goal-type"><option value="time">設定時間</option><option value="count">設定次數</option></select>
            </div>
            <div id="goal-time-input" class="input-row"><input type="number" id="target-time" value="60" style="width:50px;"> 分鐘</div>
            <div id="goal-count-input" class="input-row" style="display:none;"><input type="number" id="target-count" value="108" style="width:60px;"> 次數</div>
            
            <button id="start-btn" disabled style="width: 80%; background: #4CAF50; color: white; margin-top: 10px; padding: 10px; border-radius: 8px;">開始修行儀軌</button>
        </div>

        <div class="instruments-area">
            <div id="muyu-btn" class="instrument-item">
                <img src="muyu_image.png" alt="木魚">
                <span id="float-muyu" class="floating-label">叩首</span>
            </div>
            <div id="qing-btn" class="instrument-item">
                <img src="qing_image.png" alt="磬">
                <span id="float-qing" class="floating-label">鳴磬</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
