<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>隨身道場 - 自定義修行版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #force-start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 99999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .unlock-btn { border: 2px solid #ffcf40; color: #ffcf40; padding: 25px 35px; border-radius: 50px; text-align: center; line-height: 1.6; }
        #timer-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #444; }
        #timer-clock { font-size: 1.8rem; color: #ff9500; font-weight: bold; font-family: monospace; letter-spacing: 2px; }
        .goal-group { display: none; } /* 初始隱藏，由 JS 控制顯示 */
    </style>
</head>
<body>
    <div id="force-start-overlay">
        <div class="unlock-btn">🙏<br>進入自定義道場<br><span style="font-size:12px; opacity:0.8;">支援設定「時間」或「次數」目標</span></div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: -5px;">
            <p id="streak-counter" style="font-size: 0.85rem; color: #4CAF50; font-weight: bold; margin: 0;">連續修行：0 天</p>
            <p id="lifetime-counter" style="font-size: 0.85rem; color: #bbb; margin: 0;">累計進度：0</p>
        </div>
        
        <h1 id="counter" style="margin-top: 10px; margin-bottom: 5px;">本次進度：0</h1>

        <div id="timer-box">
            <div id="timer-label" style="font-size: 0.8rem; color: #888;">修行計時</div>
            <div id="timer-clock">00:00</div>
        </div>

        <p id="status-text">請設定目標後開始</p>

        <div class="control-panel">
            <div class="input-group">
                <label>修行模式：</label>
                <select id="mode-select" style="background: #333; color: white; border: 1px solid #555;">
                    <option value="recitation">默念模式 (5下計1)</option>
                    <option value="standard">標準模式 (1下計1)</option>
                </select>
            </div>

            <div class="input-group">
                <label>目標類型：</label>
                <select id="goal-type" style="background: #333; color: white; border: 1px solid #555;">
                    <option value="time">設定修持時間</option>
                    <option value="count">設定修持次數</option>
                </select>
            </div>

            <div id="goal-time-group" class="input-group" style="display: block;">
                <label>修持分鐘：</label>
                <input type="number" id="target-time" value="60" min="1" style="width: 60px;"> 分
            </div>
            <div id="goal-count-group" class="input-group" style="display: none;">
                <label>目標進度：</label>
                <input type="number" id="target-count" value="108" min="1" style="width: 60px;"> 次
            </div>

            <div class="input-group">
                <label>敲擊速度：</label>
                <input type="number" id="speed-input" value="60" min="1" max="200" style="width: 50px;"> BPM
            </div>

            <div class="button-group" style="margin-top: 10px;">
                <button id="start-btn" disabled style="width: 100px; background: #4CAF50; color: white;">開始修行</button>
                <button id="stop-btn" style="width: 100px; background: #f44336; color: white;">停止</button>
            </div>
        </div>

        <div id="muyu-btn" style="cursor: pointer; -webkit-tap-highlight-color: transparent;">
            <img src="muyu_image.png" alt="木魚" id="muyu-img" style="width: 150px;">
            <span id="floating-text">修行中</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
