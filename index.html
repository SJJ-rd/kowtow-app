<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>隨身道場 - 最終圓滿版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #force-start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 99999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .unlock-btn { border: 2px solid #ffcf40; color: #ffcf40; padding: 25px 35px; border-radius: 50px; text-align: center; line-height: 1.6; }
        
        /* 樂器並排區 */
        .instruments-area {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 25px; margin-top: 15px;
        }
        .instrument-item {
            position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .instrument-item:active { transform: scale(0.92); }
        .instrument-item img { width: 120px; height: auto; filter: drop-shadow(0 0 8px rgba(255,207,64,0.3)); }
        
        .floating-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            opacity: 0; color: #ffcf40; font-weight: bold; pointer-events: none;
        }
        .animate-up { animation: floatUp 0.5s ease-out; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -50px); opacity: 0; } }

        #timer-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin: 10px 0; border: 1px solid #444; }
        #timer-clock { font-size: 1.8rem; color: #ff9500; font-weight: bold; font-family: monospace; letter-spacing: 2px; }
        .input-row { margin: 8px 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        select, input { background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 4px; margin: 0 5px; }

        /* 🌟 按鈕並排樣式 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .button-group button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="force-start-overlay">
        <div class="unlock-btn">🙏<br>進入道場修行<br><span style="font-size:12px; opacity:0.8;">請先點擊此處解鎖音訊</span></div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: -5px;">
            <p id="streak-counter" style="font-size: 0.85rem; color: #4CAF50; font-weight: bold; margin: 0;">連續修行：0 天</p>
            <p id="lifetime-counter" style="font-size: 0.85rem; color: #bbb; margin: 0;">累計進度：0</p>
        </div>
        
        <h1 id="counter" style="margin-top: 10px; margin-bottom: 5px;">本次進度：0</h1>

        <div id="timer-box">
            <div id="timer-label" style="font-size: 0.8rem; color: #888;">修行計時</div>
            <div id="timer-clock">00:00</div>
        </div>

        <div class="control-panel">
            <div class="input-row">
                <label>模式：</label>
                <select id="mode-select">
                    <option value="recitation">默念模式 (5:1)</option>
                    <option value="standard">標準模式 (1:1)</option>
                </select>
                <label>目標：</label>
                <select id="goal-type">
                    <option value="time">設定時間</option>
                    <option value="count">設定次數</option>
                </select>
            </div>

            <div id="goal-time-input" class="input-row" style="display: block;">
                <label>修持分鐘：</label>
                <input type="number" id="target-time" value="60" style="width:50px;">
            </div>
            <div id="goal-count-input" class="input-row" style="display: none;">
                <label>目標進度：</label>
                <input type="number" id="target-count" value="108" style="width:60px;">
            </div>

            <div class="input-row">
                <label>敲擊速度：</label>
                <input type="number" id="speed-input" value="60" min="1" max="200" style="width:50px;"> BPM
            </div>

            <div class="button-group">
                <button id="start-btn" disabled style="background: #4CAF50; color: white;">開始修行</button>
                <button id="stop-btn" style="background: #f44336; color: white;">停止</button>
            </div>
        </div>

        <div class="instruments-area">
            <div id="muyu-btn" class="instrument-item">
                <img src="muyu_image.png" alt="木魚">
                <span id="float-muyu" class="floating-label">叩首</span>
            </div>
            <div id="qing-btn" class="instrument-item">
                <img src="qing_image.png" alt="磬">
                <span id="float-qing" class="floating-label">鳴磬</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
